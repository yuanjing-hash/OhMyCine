name: Player CI

on:
  push:
    branches: [main]
    paths:
      - "player/**"
      - ".github/workflows/player.yml"
  pull_request:
    branches: [main]
    paths:
      - "player/**"
      - ".github/workflows/player.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: player

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: player/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Verify scraper classification
        run: npm run verify:scraper

      - name: Verify OpenList/Alist auth recovery
        run: npm run verify:alist-auth-recovery

      - name: Verify home fault isolation
        run: npm run verify:home-fault-isolation

      - name: Verify raw source index scheduler
        run: npm run verify:raw-source-index-scheduler

      - name: Verify TMDB auth routing
        run: npm run verify:tmdb-auth

  build:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runner: ubuntu-latest
            artifact: player-ubuntu-latest
          - target: windows-gnu
            runner: ubuntu-latest
            artifact: player-windows-gnu
          - target: macos
            runner: macos-latest
            artifact: player-macos-latest

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: player

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: player/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.target != 'windows-gnu'

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.target == 'windows-gnu'
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install dependencies (Ubuntu)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libmpv-dev

      - name: Install Windows cross-build dependencies
        if: matrix.target == 'windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis zip

      - name: Install dependencies (macOS)
        if: matrix.target == 'macos'
        run: brew install mpv

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: player/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        if: matrix.target != 'windows-gnu'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: player

      - name: Prepare Windows libmpv runtime
        if: matrix.target == 'windows-gnu'
        run: npm run setup:libmpv -- windows

      - name: Build Windows GNU installer
        if: matrix.target == 'windows-gnu'
        run: RUSTC="$(rustup which rustc)" npm run tauri:build:windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            player/src-tauri/target/release/bundle/**/*.deb
            player/src-tauri/target/release/bundle/**/*.AppImage
            player/src-tauri/target/release/bundle/**/*.dmg
            player/src-tauri/target/release/bundle/**/*.app
            player/src-tauri/target/x86_64-pc-windows-gnu/release/bundle/**/*.exe
          retention-days: 30
